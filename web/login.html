<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internly Access</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function () {
        try {
          var key = "internly-theme";
          var saved = window.localStorage.getItem(key);
          if (saved === "dark" || saved === "light") {
            document.documentElement.setAttribute("data-theme", saved);
            return;
          }
          document.documentElement.setAttribute("data-theme", "dark");
        } catch (error) {
          /* no-op */
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/overhaul.css" />
  </head>
  <body class="landing-body">
    <main class="landing-shell">
      <nav class="marketing-nav card">
        <a class="brand-lockup" href="/">
          <span class="brand-top">
            <img class="brand-icon" src="/favicon.png" alt="" />
            <strong class="brand-wordmark">Internly</strong>
          </span>
        </a>
        <div class="nav-center">
          <div class="marketing-links">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link is-active" href="/app">Dashboard</a>
            <a class="nav-link" href="/applications">Applications</a>
          </div>
          <label class="theme-switch-wrap" for="themeSwitch">
            <input
              id="themeSwitch"
              class="theme-switch-input"
              type="checkbox"
              role="switch"
              aria-label="Toggle dark mode"
            />
            <span class="theme-switch-track" aria-hidden="true">
              <span class="theme-switch-knob"></span>
            </span>
            <span id="themeSwitchLabel" class="theme-switch-label">Dark</span>
          </label>
        </div>
        <a class="nav-lock" href="/app" aria-label="Go to dashboard">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 0V7a1 1 0 1 1 2 0v2h-2Z"
            />
          </svg>
        </a>
      </nav>

      <section class="card auth-card">
        <div class="section-head">
          <h2>Access Internly</h2>
          <p>Login for saved dashboards, or continue as guest for temporary tracking.</p>
        </div>
        <div class="auth-grid">
          <form id="loginForm" class="auth-form">
            <h3>Login</h3>
            <label>
              Username
              <input id="loginUsername" name="username" autocomplete="username" required />
            </label>
            <label>
              Password
              <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">Login</button>
          </form>

          <form id="registerForm" class="auth-form">
            <h3>Create Account</h3>
            <label>
              Username
              <input id="registerUsername" name="username" autocomplete="username" required />
            </label>
            <label>
              Password (min 8)
              <input
                id="registerPassword"
                name="password"
                type="password"
                minlength="8"
                autocomplete="new-password"
                required
              />
            </label>
            <button type="submit">Create Account</button>
          </form>
        </div>
        <div class="auth-row">
          <button id="guestModeBtn" class="secondary" type="button">Continue As Guest</button>
          <button id="authLogoutBtn" class="secondary hidden" type="button">Sign Out</button>
          <a id="continueBtn" class="page-link hidden" href="/app">Continue To Dashboard</a>
        </div>
        <p id="authMessage" class="auth-message"></p>
      </section>
    </main>

    <script>
      (function () {
        var key = "internly-theme";
        var themeSwitch = document.getElementById("themeSwitch");
        var themeSwitchLabel = document.getElementById("themeSwitchLabel");
        if (!themeSwitch) return;

        function apply(theme) {
          document.documentElement.setAttribute("data-theme", theme);
          var isDark = theme === "dark";
          themeSwitch.checked = isDark;
          if (themeSwitchLabel) {
            themeSwitchLabel.textContent = isDark ? "Dark" : "Light";
          }
        }

        function getInitial() {
          try {
            var saved = window.localStorage.getItem(key);
            if (saved === "dark" || saved === "light") return saved;
          } catch (error) {
            /* no-op */
          }
          return "dark";
        }

        apply(getInitial());
        themeSwitch.addEventListener("change", function () {
          var next = themeSwitch.checked ? "dark" : "light";
          apply(next);
          try {
            window.localStorage.setItem(key, next);
          } catch (error) {
            /* no-op */
          }
        });
      })();
    </script>
    <script src="/auth.js" defer></script>
  </body>
</html>
